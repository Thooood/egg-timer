<!DOCTYPE html>
<html lang="en">
<head>
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Contact page of Your Website" />
  <link rel="icon" href="Assets/egg">
  <link rel="stylesheet" href="Assets/nav.css">
  <title>Contact</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; }
    header, footer { background:rgb(200, 214, 71); color:#000000; padding: 16px; }
    nav ul { display:flex; gap:16px; list-style:none; padding:0; margin:8px 0 0; }
    nav a { color:#000000; text-decoration:none; }
    nav a[aria-current="page"] { text-decoration: underline; font-weight: 700; }
    main { padding: 24px; }
    form { max-width: 560px; margin-top: 16px; }
    label { font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0 16px; border:1px solid #ccc; border-radius:6px; font: inherit; }
    button { background:#0b5; border:none; color:#fff; padding:10px 16px; border-radius:6px; cursor:pointer; }
    button:hover { opacity:.9; }
    .contact-info { margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>Your Website</h1>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="Services.html">Services</a></li>
        <li><a href="Contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <header>
      <h2>Contact Us</h2>
      <p>Reach out for questions or service requests.</p>
      <div class="contact-info">
        <p>Email: mailto:PerfectlyYolks@gmail.com</a></p>
        <p>Phone: tel:+639123456789 or +63 912 345 6789</a></p>
      </div>
    </header>

    <section aria-label="Contact form">
      <h3>Send a Message</h3>
      #
        <div>
          <label for="name">Full Name</label><br />
          <input type="text" id="name" name="name" required />
        </div>
        <div>
          <label for="email">Email</label><br />
          <input type="email" id="email" name="email" required />
        </div>
        <div>
          <label for="message">Message</label><br />
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button type="submit">Send</button>
      </form>
      <!-- Note: Backend processing will be added in later weeks -->
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> Your Website. All rights reserved.</p>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
